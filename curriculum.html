<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM ROADMAP | 12-Month Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #238636;
            --accent-glow: rgba(35, 134, 54, 0.3);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .background-blob {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 75%);
            top: -300px;
            right: -300px;
            z-index: -1;
            filter: blur(100px);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-50px, 50px); }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Roadmap Grid */
        .roadmap-grid {
            display: grid;
            gap: 40px;
        }

        .month-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .month-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
        }

        .month-info h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .month-tag {
            background: var(--accent);
            color: #fff;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        .card-body {
            padding: 40px;
            display: none; /* Collapsed by default in roadmap view */
        }

        .month-card.active .card-body {
            display: block;
        }

        .section-label {
            color: var(--text-dim);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .course-list {
            list-style: none;
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .course-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 24px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .course-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.1);
            transform: scale(1.01);
        }

        .course-item h4 {
            font-family: 'Outfit';
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .course-item p {
            font-size: 0.85rem;
            color: var(--text-dim);
            max-width: 500px;
        }

        .btn-course {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(35, 134, 54, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn-course:hover {
            background: var(--accent);
            color: #fff;
        }

        .goal-box {
            background: rgba(35, 134, 54, 0.1);
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 4px 16px 16px 4px;
        }

        .footer-nav {
            margin-top: 80px;
            text-align: center;
        }

        .btn-back {
            background: rgba(255,255,255,0.05);
            color: #fff;
            padding: 12px 30px;
            border-radius: 99px;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
    
    <div class="container">
        <header>
            <div class="subtitle">12-Month International Master Path</div>
            <h1>The Grandmaster Protocol</h1>
        </header>

        <div id="roadmap-root" class="roadmap-grid">
            <!-- Dynamic Content -->
        </div>

        <div class="footer-nav">
            <a href="index.html" class="btn-back">← RETURN TO COMMAND CENTER</a>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function renderRoadmap() {
            const root = document.getElementById('roadmap-root');
            if (!window.chessCurriculum) return;

            const html = window.chessCurriculum.map((m, idx) => `
                <div class="month-card ${idx === 0 ? 'active' : ''}" id="m-card-${m.month}">
                    <div class="card-header" onclick="toggleCard(${m.month})">
                        <div class="month-info">
                            <h2><span class="month-tag">MONTH ${m.month}</span> ${m.dailyFocus}</h2>
                        </div>
                        <div style="color:var(--accent); font-weight:800;">[ ${m.theme.toUpperCase()} ]</div>
                    </div>
                    <div class="card-body">
                        <span class="section-label">Enrolled Courses</span>
                        <div class="course-list">
                            ${m.courses.map(c => `
                                <div class="course-item">
                                    <div style="flex: 1;">
                                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                                            <h4 style="margin:0;">${c.title}</h4>
                                            <span style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; color: var(--accent); font-weight: 800; letter-spacing: 0.5px;">${c.level}</span>
                                        </div>
                                        <p style="margin-bottom:12px; line-height:1.5;">${c.job}</p>
                                        <div style="display:flex; gap:12px; align-items:center;">
                                            <a href="${c.htmlPath || '#'}" class="btn-course" style="background: var(--accent); color: #fff; padding: 8px 20px; font-size:0.8rem; border:none; box-shadow: 0 4px 12px var(--accent-glow);">
                                                START TRAINING
                                            </a>
                                            <a href="${c.link}" target="_blank" style="color:var(--text-dim); font-size:0.7rem; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.2);">
                                                Official Source ↗
                                            </a>
                                        </div>
                                    </div>
                                    <div style="text-align:right; margin-left: 20px; min-width: 150px;">
                                        <div style="color:var(--text-main); font-weight:800; font-size:0.8rem; letter-spacing:0.5px;">${c.coach}</div>
                                        <div style="font-size:0.7rem; color:var(--accent); font-weight:700; margin-top:2px; text-transform:uppercase; letter-spacing:1px;">${c.superpower}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="goal-box">
                            <span class="section-label" style="margin-bottom:8px; color:var(--accent);">Phase Objective</span>
                            <p style="font-size:0.95rem;">${m.reward}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            root.innerHTML = html;
        }

        function toggleCard(m) {
            const card = document.getElementById(`m-card-${m}`);
            card.classList.toggle('active');
        }

        document.addEventListener('DOMContentLoaded', renderRoadmap);
    </script>
</body>
</html>
