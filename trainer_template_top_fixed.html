<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preventing Blunders in Chess</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
/* ===== Dark theme colors ===== */
:root {
  --body-bg: #0f161f;
  --panel-bg: #14191f;
  --sidebar-bg: #0f161f;
  --sidebar-item: #14191f;
  --sidebar-active: #00f75a;
  --text: #eaeaea;
  --text-dim: #aaa;
  --move-blue: #00f75a;
  --active-move: #6c5ce7;
  --font: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "Segoe UI Emoji", Roboto, Oxygen, Ubuntu, Cantarell, Arial, "Helvetica Neue", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--body-bg); color: var(--text); font-family: var(--font);
  font-size: 15px; line-height: 21px; height: 100vh; overflow: hidden;
}

/* ===== Layout ===== */
.app { display: flex; height: 100vh; }

/* ===== Sidebar ===== */
.sidebar-wrapper { position: relative; display: flex; flex-shrink: 0; }
.sidebar {
  width: 322px; min-width: 260px; background: var(--sidebar-bg);
  border-right: 1px solid rgba(255,255,255,0.05);
  display: flex; flex-direction: column;
  transition: width 0.2s, min-width 0.2s;
  scrollbar-color: rgba(255,255,255,0.2) transparent; scrollbar-width: thin;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
.sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; }
.sidebar-wrapper:has(.sidebar.collapsed) ~ .notation-panel { width: 600px; min-width: 600px; }
.sidebar-header { padding: 16px 18px; flex-shrink: 0; }
.sidebar-header .course-title { font-size: 17px; font-weight: 600; }
.sidebar-scroll { flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
  scrollbar-color: rgba(255,255,255,0.2) transparent; scrollbar-width: thin;
}
.sidebar-scroll::-webkit-scrollbar { width: 6px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
.sidebar-toggle {
  position: absolute; top: 72px; right: -16px; width: 32px; height: 32px;
  background: #14191f; border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: rgba(255,255,255,0.7); cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  transition: background 0.15s, color 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.sidebar-toggle:hover { background: rgba(255,255,255,0.07); color: #fff; }
.ch-header {
  padding: 11.5px 15.5px; font-weight: 600; font-size: 17px;
  background: #14191f; color: #fff;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.var-list { display: block; }
/* SVG data URIs for dots and circles */
:root {
  --board-select-bg: rgba(245,208,70,0.6);
  --board-last-bg: rgba(245,208,70,0.35);
  --board-hint-dot: rgba(0,0,0,0.25);
  --board-capture-ring: rgba(0,0,0,0.25);
  --board-wrong-bg: rgba(220,50,50,0.6);
  --board-correct-bg: rgba(76,175,80,0.5);
  --board-trainer-hint-bg: rgba(235,180,50,0.7);
  --draw-green: #31cb44;
  --draw-red: #882020;
  --draw-blue: #003088;
  --draw-yellow: #e68f00;
  --draw-opacity: 0.8;
  --status-success: #4caf50;
  --status-warning: #f0c040;
  --status-danger: #f44336;
  --svg-dots: url("data:image/svg+xml,%3Csvg width='56' height='46' viewBox='0 0 14 46' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='45' r='1' fill='%239A95B2'/%3E%3Ccircle cx='1' cy='37' r='1' fill='%239A95B2'/%3E%3Ccircle cx='1' cy='9' r='1' fill='%239A95B2'/%3E%3Ccircle cx='1' cy='1' r='1' fill='%239A95B2'/%3E%3C/svg%3E");
  --svg-dots-start: url("data:image/svg+xml,%3Csvg width='56' height='46' viewBox='0 0 14 46' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='9' r='1' fill='%239A95B2'/%3E%3Ccircle cx='1' cy='1' r='1' fill='%239A95B2'/%3E%3C/svg%3E");
  --svg-dots-end: url("data:image/svg+xml,%3Csvg width='56' height='46' viewBox='0 0 14 46' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='45' r='1' fill='%239A95B2'/%3E%3Ccircle cx='1' cy='37' r='1' fill='%239A95B2'/%3E%3C/svg%3E");
  --svg-dots-active: url("data:image/svg+xml,%3Csvg width='56' height='46' viewBox='0 0 14 46' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='45' r='1' fill='%23AEDDFD'/%3E%3Ccircle cx='1' cy='37' r='1' fill='%23AEDDFD'/%3E%3Ccircle cx='1' cy='9' r='1' fill='%23AEDDFD'/%3E%3Ccircle cx='1' cy='1' r='1' fill='%23AEDDFD'/%3E%3C/svg%3E");
  --svg-check-read: url("data:image/svg+xml,%3Csvg width='56' height='60' viewBox='0 0 56 60' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' clip-rule='evenodd' d='M22 38c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm3.808-9.2a.857.857 0 00-1.179-1.2l-3.564 3.432-1.257-1.21a.857.857 0 00-1.202 1.222l1.846 1.778.59.568.59-.568 4.154-4z' fill='%239A95B2'/%3E%3C/svg%3E");
  --svg-check-active: url("data:image/svg+xml,%3Csvg width='56' height='60' viewBox='0 0 56 60' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' clip-rule='evenodd' d='M22 38c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm3.808-9.2a.857.857 0 00-1.179-1.2l-3.564 3.432-1.257-1.21a.857.857 0 00-1.202 1.222l1.846 1.778.59.568.59-.568 4.154-4z' fill='%23fff'/%3E%3C/svg%3E");
  --svg-empty-circle: url("data:image/svg+xml,%3Csvg width='56' height='60' viewBox='0 0 56 60' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='15.14' y='23.14' width='13.71' height='13.71' rx='6.86' stroke='%239A95B2' stroke-opacity='0.7' stroke-width='2.29'/%3E%3C/svg%3E");
}
.var-item {
  padding: 0; font-size: 15px; cursor: pointer; height: 52px;
  display: block; position: relative;
  background-color: var(--sidebar-item);
  background-image: var(--svg-dots); background-repeat: no-repeat; background-position: 100% 50%;
  background-size: auto;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.var-item:first-child { background-image: var(--svg-dots-end); }
.var-item:last-child { background-image: var(--svg-dots-start); }
.var-item:only-child { background-image: none; }
.var-item:hover { filter: brightness(1.1); }
.var-item.active {
  background-color: var(--active-move); color: #fff;
  background-image: var(--svg-dots-active);
}
.var-item .var-name {
  display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-left: 20px; width: calc(100% - 52px); line-height: 52px;
}
/* Status circle via ::after */
.var-item::after {
  content: ''; position: absolute; right: 0; top: 0; width: 100%; height: 52px;
  background-image: var(--svg-empty-circle); background-repeat: no-repeat;
  background-position: 100% 50%; pointer-events: none;
}
.var-item.visited::after { background-image: var(--svg-check-read); }
.var-item.active.visited::after { background-image: var(--svg-check-active); }
.var-item.active:not(.visited)::after { background-image: var(--svg-empty-circle); }

/* ===== Board area ===== */
.board-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 10px; position: relative;
}
#board-wrap { position: relative; width: 440px; height: 440px; }
#board-wrap svg.arrows { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
.board-coord-overlay {
  position: absolute; inset: 0; display: grid; grid-template-columns: repeat(8,1fr);
  grid-template-rows: repeat(8,1fr); pointer-events: none; z-index: 6;
}
.board-coord-cell { position: relative; }
.board-coord-rank-label, .board-coord-file-label {
  position: absolute; font-size: 13px; font-weight: 700; line-height: 1;
}
.board-coord-rank-label { right: 3px; top: 3px; }
.board-coord-file-label { left: 3px; bottom: 3px; }
.square-55d63.click-selected { background: var(--board-select-bg) !important; }
.square-55d63.click-hint { position: relative; }
.square-55d63.click-hint::after { content:''; position:absolute; width:33%; height:33%; border-radius:50%; background:var(--board-hint-dot); top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
.square-55d63.click-hint.click-capture::after { width:100%; height:100%; border-radius:0; background:none; border:4px solid var(--board-capture-ring); box-sizing:border-box; }
.square-55d63.click-last { background: var(--board-last-bg) !important; }
@keyframes flashWrong { 0%{background:var(--board-wrong-bg)} 100%{background:inherit} }
.square-55d63.click-wrong { animation: flashWrong 0.55s ease; }
.board-label { text-align: center; padding: 6px; font-size: 14px; color: var(--text-dim); }
.nav-btns { display: flex; gap: 8px; padding: 10px; }
.nav-btns button {
  background: rgba(255,255,255,0.08); border: none; color: var(--text);
  font-size: 20px; padding: 8px 18px; border-radius: 4px; cursor: pointer;
}
.nav-btns button:hover { background: rgba(255,255,255,0.15); }
.nav-btns button.next-btn { background: var(--sidebar-active); color: #fff; padding: 8px 24px; }
.nav-btns button.next-btn:hover { background: #2899e6; }
/* Hide variation prev/next from board bar — they live in the notation header */
#btn-prev-var, #btn-next-var { display: none; }

/* ===== Notation panel ===== */
.notation-panel {
  width: 460px; min-width: 380px; background: var(--panel-bg);
  border-radius: 3px; display: flex; flex-direction: column;
  height: calc(100vh - 20px); margin: 10px 10px 10px 0;
}
.practice-header {
  padding: 12px 22px; border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between; align-items: center;
}
.practice-header .var-title { font-size: 17px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
.var-nav-btns { display: flex; gap: 4px; flex-shrink: 0; }
.var-nav-btns button {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: var(--text); font-size: 16px; font-weight: 700;
  width: 32px; height: 32px; border-radius: 5px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s; line-height: 1;
}
.var-nav-btns button:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.25); }
.var-nav-btns button:active { background: rgba(255,255,255,0.25); }
.teach-comment { flex: 1; overflow-y: auto; padding: 18px 22px 60px 22px; }

/* Move line bar */
.move-line { margin-bottom: 18px; font-size: 17px; font-weight: 600; line-height: 1.8; }
.move-line .rewind { cursor: pointer; opacity: 0.6; margin-right: 4px; }
.move-line .rewind:hover { opacity: 1; }
.ml-move { color: var(--text); cursor: pointer; padding: 2px 4px; border-radius: 3px; }
.ml-move:hover { background: rgba(255,255,255,0.1); }
.ml-move.active { background: #6b5fa5; color: #fff; }
.ml-move .ml-num { color: var(--text-dim); margin-right: 1px; }
.ml-move.active .ml-num { color: #fff; }
.mh-move .mh-num { color: var(--text-dim); margin-right: 1px; }
.mh-move.active .mh-num { color: #fff; }

/* Move heading */
.move-heading { margin: 20px 0 8px 0; font-size: 17px; font-weight: 600; }
.move-heading .mh-label { color: var(--text-dim); margin-right: 4px; }
.mh-move { cursor: pointer; padding: 2px 5px; border-radius: 3px; transition: background 0.15s; }
.mh-move:hover { background: rgba(123,170,255,0.15); }
.mh-move.active { background: var(--active-move); color: #fff; }
.move-heading .ann { color: #f0c040; margin-left: 2px; font-weight: 700; }

/* Inline moves group */
.inline-moves { margin: 16px 0 8px 0; font-size: 17px; font-weight: 600; line-height: 1.8; }

/* Comment text */
.comment-block { margin: 6px 0 12px 0; font-size: 15px; line-height: 21px; color: var(--text); }
.comment-block strong { font-weight: 700; }
.comment-header { font-size: 17px; font-weight: 700; color: var(--text); margin: 14px 0 6px 0; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); }

/* Inline clickable moves in comments (blue) */
.var-move { color: var(--move-blue); font-weight: 600; font-size: 17px; cursor: pointer; text-decoration: underline; text-decoration-color: transparent; padding: 1px 3px; border-radius: 3px; transition: background 0.15s; }
.var-move:hover { text-decoration-color: var(--move-blue); background: rgba(123,170,255,0.1); }
.var-move.active { background: var(--active-move); color: #fff; text-decoration-color: transparent; }

/* SAN references (bold, not clickable) */
.san-ref { font-weight: 700; }

/* Links in comments (chapter links etc) */
.comment-block a, .comment-text a {
  color: var(--move-blue); text-decoration: none; font-weight: 600;
}
.comment-block a:hover, .comment-text a:hover { text-decoration: underline; }

/* Variation parentheses */
.variation .var-move { font-size: 15px; }
.move-ann { color: #e6a817; font-weight: 700; margin-left: 1px; }

/* Bottom toolbar */
.practice-footer {
  padding: 10px 22px; border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; gap: 14px; align-items: center;
}
.practice-footer button { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 4px; }
.practice-footer button:hover { color: var(--text); }

/* Scrollbar */
.teach-comment::-webkit-scrollbar { width: 6px; }
.teach-comment::-webkit-scrollbar-track { background: transparent; }
.teach-comment::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
/* ===== MoveTrainer mode ===== */
body.trainer-active .teach-comment { display: none; }
body.trainer-active #nav-btns { display: none; }
body.trainer-active #pos-label { display: none; }
.trainer-panel { display: none; flex-direction: column; flex:1; overflow-y:auto; }
body.trainer-active .trainer-panel { display: flex; }
.trainer-comment { padding: 18px 22px; font-size: 15px; line-height: 21px; color: var(--text); }
.trainer-quiz { padding: 12px 22px; }
.trainer-quiz h3 { font-size: 15px; font-weight: 700; color: var(--text-dim); margin-bottom: 4px; }
.trainer-quiz .trainer-prompt { font-size: 17px; font-weight: 600; }
.trainer-feedback { text-align: center; padding: 14px; font-size: 16px; font-weight: 600; min-height: 48px; }
.trainer-feedback.correct { color: var(--status-success); }
.trainer-feedback.wrong { color: var(--status-danger); }
.trainer-done { text-align: center; padding: 30px 22px; }
.trainer-done h2 { font-size: 20px; font-weight: 700; color: var(--status-success); margin-bottom: 16px; }
.trainer-done button { background: var(--sidebar-active); color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
.trainer-done button:hover { filter: brightness(1.1); }
.trainer-moves { padding: 8px 22px; font-size: 15px; color: var(--text-dim); line-height: 1.8; }
.trainer-moves .t-move { padding: 2px 4px; border-radius: 3px; }
.trainer-moves .t-move.t-played { color: var(--text); font-weight: 600; }
.trainer-moves .t-num { color: var(--text-dim); margin-right: 1px; }
.trainer-hint-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: var(--text); padding: 6px 16px; border-radius: 5px; cursor: pointer; font-size: 14px; }
.trainer-hint-btn:hover { background: rgba(255,255,255,0.18); }
.trainer-hint-btn.hint-used { color: var(--status-warning); border-color: var(--status-warning); }
#btn-trainer.trainer-on, #btn-trainer-m.trainer-on { color: var(--status-success); }
.trainer-board-hint { text-align: center; padding: 6px 0; }
.trainer-board-hint .trainer-hint-btn { font-size: 15px; padding: 8px 20px; }
@keyframes flashCorrect { 0%{background:var(--board-correct-bg)} 100%{background:inherit} }
.square-55d63.click-correct { animation: flashCorrect 0.5s ease; }
.square-55d63.trainer-hint-sq { background: var(--board-trainer-hint-bg) !important; }
/* Trainer complete: show notation, hide trainer panel, restore nav */
body.trainer-active.trainer-complete .teach-comment { display: block !important; padding-bottom: 0; }
body.trainer-active.trainer-complete .trainer-panel { display: none !important; }
body.trainer-active.trainer-complete #nav-btns { display: flex !important; }
body.trainer-active.trainer-complete .trainer-board-hint { display: none !important; }
.trainer-complete-banner {
  padding: 16px 22px; text-align: center; border-top: 1px solid rgba(255,255,255,0.08);
}
.trainer-complete-banner h3 { color: var(--status-success); font-size: 17px; margin: 0 0 12px 0; }
.trainer-complete-banner .trainer-done-btns { display: flex; gap: 10px; justify-content: center; }
.trainer-complete-banner .trainer-done-btns button {
  border: none; padding: 9px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.trainer-complete-banner .btn-next-var {
  background: var(--sidebar-active); color: #fff;
}
.trainer-complete-banner .btn-next-var:hover { filter: brightness(1.1); }
.trainer-complete-banner .btn-exit-trainer {
  background: rgba(255,255,255,0.08); color: var(--text);
}
.trainer-complete-banner .btn-exit-trainer:hover { background: rgba(255,255,255,0.15); }

.board-b72b1 { border-radius: 0; }
/* Board colors applied dynamically via #board-theme-style */
/* King-in-check highlight */
.board-b72b1 .square-55d63.highlight-check {
  background: radial-gradient(ellipse at center, #ff0000 0%, #cc0000 50%, rgba(180,0,0,0.4) 100%) !important;
}

/* ===== Settings panel ===== */
.settings-panel {
  display: none; position: fixed; z-index: 1000;
  background: #14191f; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 16px; min-width: 220px; max-width: calc(100vw - 20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); color: var(--text);
  font-size: 14px;
}
.settings-panel.open { display: block; }
.settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; color: var(--text-dim); }
.settings-select {
  width: 100%; padding: 7px 10px; border-radius: 6px;
  background: #0f161f; border: 1px solid rgba(255,255,255,0.15);
  color: var(--text); font-size: 14px; cursor: pointer; outline: none;
}
.settings-select:focus { border-color: var(--sidebar-active); }
.settings-reset {
  width: 100%; padding: 7px; border-radius: 6px; border: none;
  background: rgba(255,255,255,0.08); color: var(--text-dim);
  font-size: 13px; cursor: pointer;
}
.settings-reset:hover { background: rgba(255,255,255,0.15); }

/* ===== Mobile responsive ===== */
@media (max-aspect-ratio: 1/1) {
  body { height: 100vh; overflow: hidden; }
  .app { flex-direction: column; height: 100vh; overflow: hidden; }

  /* Sidebar as overlay drawer */
  .sidebar-wrapper { position: fixed; top: 0; left: 0; z-index: 100; height: 100vh; pointer-events: none; }
  .sidebar {
    width: 280px; min-width: 280px; height: 100vh;
    transform: translateX(-100%); transition: transform 0.25s ease;
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    pointer-events: auto;
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar.collapsed { transform: translateX(-100%); }
  .sidebar-toggle { display: none; }
  .mobile-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 99;
  }
  .mobile-overlay.show { display: block; }

  /* Board area fixed at top - does NOT scroll */
  .board-area { padding: 0; width: 100%; flex-shrink: 0; }
  #board-wrap { width: min(100vw, calc(100vh - 200px)) !important; height: min(100vw, calc(100vh - 200px)) !important; max-width: 500px; max-height: 500px; margin: 0 auto; }
  #board-wrap #board { width: 100% !important; height: 100% !important; }
  .board-label { display: none; }
  .nav-btns { display: none; } /* hide desktop nav on mobile */

  /* Notation panel scrollable below board, above bottom bar */
  .notation-panel {
    width: 100%; min-width: 0; margin: 0;
    border-radius: 0; flex: 1; min-height: 0; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .notation-panel .practice-header { display: none; }
  .teach-comment { padding: 12px 16px 80px 16px; flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* Mobile bottom nav bar */
  .mobile-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; padding: 0 8px; height: 32px;
    background: var(--body-bg); border-top: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

<script>
(function() {
    // Offset body so content isn't hidden behind nav bar
    document.documentElement.style.paddingTop = '42px';
    document.body.style.height = 'calc(100vh - 42px)';
    
    // Set course label from page title
    const titleEl = document.querySelector('title') || document.querySelector('.course-title');
    if (titleEl) {
        const label = document.getElementById('cc-course-label');
        if (label) label.textContent = titleEl.textContent || titleEl.innerText;
    }
    
    // Fix back button path - calculate from current location
    const backBtn = document.getElementById('cc-back-btn');
    let ups = '';
    if (backBtn) {
        // Count directory depth from root
        const path = window.location.pathname;
        const depth = (path.match(/\//g) || []).length - 1;
        ups = Array(depth).fill('..').join('/');
        backBtn.href = ups + '/index.html';
    }
    
    // Load data.js dynamically
    const script = document.createElement('script');
    script.src = ups + '/data.js';
    script.onload = () => {
        if (!window.chessCurriculum) return;
        
        let currentCourse = null;
        let courseTitleMatch = (titleEl ? (titleEl.textContent || titleEl.innerText).trim() : '');
        
        // Find current course in data.js
        for (const month of window.chessCurriculum) {
            if (month.courses) {
                for (const c of month.courses) {
                    if (c.title === courseTitleMatch || c.htmlPath && window.location.pathname.includes(c.htmlPath.split('/').pop())) {
                        currentCourse = c;
                        break;
                    }
                }
            }
            if (currentCourse) break;
        }
        
        if (currentCourse && currentCourse.videos && currentCourse.videos.length > 0) {
            const videoToggle = document.getElementById('cc-video-toggle');
            const videoOverlay = document.getElementById('cc-video-overlay');
            const videoSelect = document.getElementById('cc-video-select');
            const videoPlayer = document.getElementById('cc-video-player');
            
            videoToggle.style.display = 'inline-block';
            videoSelect.style.display = 'inline-block';
            
            currentCourse.videos.forEach((v, i) => {
                const opt = document.createElement('option');
                opt.value = ups + '/' + v.path; // Make path relative
                opt.textContent = v.title;
                videoSelect.appendChild(opt);
            });
            
            if (videoPlayer) {
                videoPlayer.querySelector('source').src = ups + '/' + currentCourse.videos[0].path;
                videoPlayer.load();
            }
            
            videoSelect.addEventListener('change', () => {
                if (videoPlayer) {
                    videoPlayer.querySelector('source').src = videoSelect.value;
                    videoPlayer.load();
                    videoPlayer.play();
                }
            });
            
            videoToggle.addEventListener('click', () => {
                const isShown = videoOverlay.style.display !== 'none';
                videoOverlay.style.display = isShown ? 'none' : 'block';
            });
        }
    };
    document.head.appendChild(script);
})();
</script>
