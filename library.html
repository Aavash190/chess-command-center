<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy Library - Chess CommandCenter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .library-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            align-items: start;
        }

        .sidebar {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            position: sticky;
            top: 20px;
        }

        .nav-item {
            display: block;
            padding: 12px 16px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 242, 255, 0.1);
            color: var(--cyan);
            border-left: 3px solid var(--cyan);
        }

        .content-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            min-height: 500px;
            color: var(--text-main);
            overflow-x: auto;
        }

        /* Markdown Styles */
        .markdown-body {
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--accent);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .markdown-body h1 {
            font-size: 2.2em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }
        .markdown-body h2 {
            font-size: 1.6em;
        }
        .markdown-body p, .markdown-body ul, .markdown-body ol {
            margin-bottom: 1em;
            color: #d0d0d0;
        }
        .markdown-body a {
            color: var(--cyan);
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            color: #a0a0a0;
            background: rgba(255, 215, 0, 0.05);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        .markdown-body th, .markdown-body td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        .markdown-body th {
            background: rgba(255, 215, 0, 0.1);
            color: var(--accent);
            font-weight: 700;
        }
        .markdown-body tr:last-child td {
            border-bottom: none;
        }
        .markdown-body code {
            background: rgba(0,0,0,0.4);
            padding: 3px 6px;
            border-radius: 4px;
            font-family: inherit;
            color: var(--cyan);
        }

        @media (max-width: 900px) {
            .library-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header style="margin-bottom: 30px;">
            <h1>Strategy Library</h1>
            <p class="subtitle">Complete Internal Documentation System</p>
            <div style="margin-top: 15px;">
                <a href="index.html" class="reset-btn" style="text-decoration: none; display: inline-block;">&larr; Back to Dashboard</a>
            </div>
        </header>

        <main class="library-grid">
            <aside class="sidebar" id="nav-container">
                <!-- Navigation links generated by JS -->
            </aside>
            <section class="content-card">
                <div id="markdown-content" class="markdown-body">
                    <h2>Select a document from the left to read.</h2>
                </div>
            </section>
        </main>
    </div>

    <!-- Data and Application Logic -->
    <script src="libraryData.js"></script>
    <script src="library.js"></script>
</body>
</html>
